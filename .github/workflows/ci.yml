name: TTS Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'
    
    - name: Verify dependencies
      run: go mod verify

    - name: Validate deployment contract
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
      run: |
        BASE_REF=""
        if [ "$EVENT_NAME" = "pull_request" ]; then
          BASE_REF="$PR_BASE_SHA"
        else
          BASE_REF="$PUSH_BEFORE_SHA"
        fi
        python3 scripts/validate_deployment_contract.py --check-changed --base-ref "$BASE_REF"

    - name: Test deployment tooling
      run: python3 -m unittest tests.test_deployment_tools

    - name: Build release bundles
      run: python3 scripts/build_release_bundle.py
    
    - name: Build all components
      run: |
        mkdir -p bin
        go build -v -o bin/instant_tts_daemon instant_tts_daemon.go
        go build -v -o bin/streaming_safe_daemon streaming_safe_daemon.go
        go build -v -o bin/tts_daemon_optimized tts_daemon_optimized.go
        go build -v -o bin/fast_tts_daemon fast_tts_daemon.go
        go build -v -o bin/speak_client speak_client.go
        go build -v -o bin/tts_test_client tts_test_client.go
    
    - name: Test compilation
      run: |
        echo "Integration tests skipped - require running daemon"
        echo "Build verification completed successfully"
    
    - name: Run vet
      run: |
        echo "Running go vet on individual files to avoid main function conflicts"
        for file in *.go; do
          if [[ $file != *_test.go ]]; then
            echo "Vetting $file"
            go vet "$file" || echo "Warning: vet issues in $file"
          fi
        done
        go vet ./tests/... || echo "Warning: vet issues in tests"
    
    - name: Check for security issues
      run: |
        # Check for hardcoded IPs, secrets, personal info
        echo "Scanning for security issues..."
        if grep -r "192\.168\|10\.43\|mipwn\|Rich" . --exclude-dir=.git --exclude-dir=.github --exclude-dir=bin; then
          echo "WARNING: Found potentially sensitive information - see above"
          echo "This is temporarily allowed but should be addressed"
        else
          echo "No sensitive information detected"
        fi
    
    - name: Archive binaries
      uses: actions/upload-artifact@v4
      with:
        name: tts-pipeline-binaries
        path: bin/

    - name: Archive release bundles
      uses: actions/upload-artifact@v4
      with:
        name: mercury-tts-release-bundles
        path: dist/release-bundles/

  license-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify AGPL-3.0 license
      run: |
        grep -q "GNU AFFERO GENERAL PUBLIC LICENSE" LICENSE
        grep -q "AGPL-3.0" README.md